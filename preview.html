<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Behina Profile Preview</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
        margin: 0;
        padding: 24px;
        background: #f8fafc;
        color: #111827;
      }
      .container {
        max-width: 980px;
        margin: 0 auto;
        background: white;
        padding: 32px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }
      img {
        max-width: 100%;
      }
      pre {
        background: #f3f4f6;
        padding: 16px;
        border-radius: 8px;
        overflow-x: auto;
      }
      code {
        font-family: "SFMono-Regular", Consolas, monospace;
      }
      .container img[src*="img.shields.io"] {
        display: inline-block;
        margin: 2px 4px 2px 0;
        vertical-align: middle;
      }
      .contact-cta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 4px;
        padding: 12px 18px;
        border-radius: 999px;
        background: linear-gradient(135deg, #ff69b4, #ff7ab6);
        color: white;
        text-decoration: none;
        font-weight: 700;
        box-shadow: 0 6px 0 #c94c8d, 0 10px 20px rgba(255, 105, 180, 0.25);
        transform: translateY(0);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      .contact-cta:hover {
        transform: translateY(2px);
        box-shadow: 0 4px 0 #c94c8d, 0 8px 16px rgba(255, 105, 180, 0.22);
      }
      .contact-cta:active {
        transform: translateY(4px);
        box-shadow: 0 2px 0 #c94c8d;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div class="container" id="content">Loading preview…</div>

    <script>
      fetch("README.md")
        .then((response) => response.text())
        .then((text) => {
          document.getElementById("content").innerHTML = marked.parse(text);
        })
        .catch((error) => {
          document.getElementById("content").innerHTML = "<p>Could not load preview.</p>";
          console.error(error);
        });
    </script>
  </body>
</html>
